dependenceList: []
outDir: build
miscInfo:
  uid: eef0fa77281e220a8a282f9452f8aaad
targets:
  LDC:
    cppPreprocessAttrs:
      defineList:
        - STM32F10X_HD
        - USE_STDPERIPH_DRIVER
      incList:
        - ../../Libraries/CMSIS
        - ../../User
        - ../../Libraries/FWlib/inc
        - .cmsis/include
        - RTE/_LDC
      libList: []
    excludeList: []
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 4
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-1
            warnings: unspecified
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
        scatterFilePath: ../../../../../../stm32-ram.sct
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 3
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 1
              isChecked: true
              mem:
                size: "0x10000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 3
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x80000"
                startAddr: "0x8000000"
              tag: IROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: IROM
        useCustomScatterFile: false
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap-v1
        target: stm32f1x
      STLink:
        address: "0x8000000"
        bin: ""
        elFile: None
        optionBytes: .eide/ldc.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
      pyOCD:
        baseAddr: "0x08000000"
        bin: ""
        config: .eide/ldc.pyocd.yaml
        otherCmds: ""
        speed: 4M
        targetName: cortex_m
    uploader: STLink
